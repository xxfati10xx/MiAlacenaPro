                                    <div key={p.id} className={`${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-slate-100'} p-4 rounded-3xl border shadow-sm flex justify-between items-center`}>
                                        <div className="flex items-center gap-3">
                                            <div className="text-xl">{getIcon(p.name, p.category)}</div>
                                            <div>
                                                <h3 onClick={() => setEditingProduct(p)} className="font-bold cursor-pointer hover:text-emerald-500 transition-colors">{p.name}</h3>
                                                <p className="text-xs text-red-500 font-bold">{t.stock}: {p.stock} / Min: {p.min}</p>
                                            </div>
                                        </div>
                                        <button onClick={() => setEditingProduct(p)} className="w-10 h-10 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center font-bold">✏️</button>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : activeTab === 'stats' ? (
                        <div className="animate-pop">
                            <h2 className="text-2xl font-bold mb-6">{t.stats}</h2>
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div className={`${darkMode ? 'bg-slate-800' : 'bg-white'} p-6 rounded-[2.5rem] shadow-sm border border-transparent`}>
                                    <p className="text-xs text-slate-500 font-bold uppercase mb-1">{t.title}</p>
                                    <p className="text-3xl font-extrabold text-emerald-500">{products.length}</p>
                                </div>
                                <div className={`${darkMode ? 'bg-slate-800' : 'bg-white'} p-6 rounded-[2.5rem] shadow-sm border border-transparent`}>
                                    <p className="text-xs text-slate-500 font-bold uppercase mb-1">{t.cart}</p>
                                    <p className="text-3xl font-extrabold text-red-500">{products.filter(p => p.stock <= p.min).length}</p>
                                </div>
                            </div>

                            <div className={`${darkMode ? 'bg-slate-800' : 'bg-white'} p-6 rounded-[2.5rem] shadow-sm mb-6`}>
                                <h3 className="font-bold mb-4">{t.category}</h3>
                                <div className="space-y-4">
                                    {[...new Set(products.map(p => p.category || 'General'))].map(cat => {
                                        const count = products.filter(p => (p.category || 'General') === cat).length;
                                        const pct = (count / (products.length || 1)) * 100;
                                        return (
                                            <div key={cat}>
                                                <div className="flex justify-between text-xs font-bold mb-1 uppercase text-slate-500">
                                                    <span>{getCategoryLabel(cat)}</span>
                                                    <span>{count}</span>
                                                </div>
                                                <div className="h-2 w-full bg-slate-100 dark:bg-slate-700 rounded-full overflow-hidden">
                                                    <div className="h-full bg-emerald-500 rounded-full transition-all duration-1000" style={{ width: `${pct}%` }}></div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    ) : (
                        <div className="animate-pop text-center py-20 text-slate-400 font-bold">
                            [ERROR 404] <br/> Tab no encontrada
                        </div>
                    )}

                    {editingProduct && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
                            <div className={`animate-pop w-full max-w-md p-8 rounded-[2.5rem] shadow-2xl border ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white border-white'}`}>
                                <div className="flex justify-between items-center mb-6">
                                    <h2 className="text-2xl font-bold">{t.editTitle}</h2>
                                    <button onClick={() => setEditingProduct(null)} className="text-2xl">✕</button>
                                </div>
                                <div className="grid gap-4">
                                    <div>
                                        <label className="text-xs font-bold uppercase text-slate-400 ml-2">{t.productLabel}</label>
                                        <input
                                            value={editingProduct.name}
                                            onChange={(e) => setEditingProduct({...editingProduct, name: e.target.value})}
                                            className={`w-full p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-400 ${darkMode ? 'bg-slate-700' : 'bg-slate-50'}`}
                                        />
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="text-xs font-bold uppercase text-slate-400 ml-2">{t.stockActual}</label>
                                            <input
                                                type="number"
                                                value={editingProduct.stock}
                                                onChange={(e) => setEditingProduct({...editingProduct, stock: parseInt(e.target.value) || 0})}
                                                className={`w-full p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-400 ${darkMode ? 'bg-slate-700' : 'bg-slate-50'}`}
                                            />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-xs font-bold uppercase text-slate-400 ml-2">{t.minimum}</label>
                                            <input
                                                type="number"
                                                value={editingProduct.min}
                                                onChange={(e) => setEditingProduct({...editingProduct, min: parseInt(e.target.value) || 0})}
                                                className={`w-full p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-400 ${darkMode ? 'bg-slate-700' : 'bg-slate-50'}`}
                                            />
                                        </div>
                                    </div>
                                    <button
                                        onClick={() => {
                                            updateProduct(editingProduct);
                                            setEditingProduct(null);
                                        }}
                                        className="w-full p-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-200 mt-4"
                                    >
                                        {t.saveBtn}
                                    </button>
                                    <button
                                        onClick={() => {
                                            if(confirm(t.confirmDelete)) {
                                                setProducts(products.filter(p => p.id !== editingProduct.id));
                                                setEditingProduct(null);
                                            }
                                        }}
                                        className="w-full p-4 bg-red-50 text-red-500 rounded-2xl font-bold transition-all active:scale-95"
                                    >
                                        {t.deleteBtn}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className={`fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] md:max-w-2xl backdrop-blur-xl border rounded-[2.5rem] p-2 flex justify-around shadow-2xl z-50 transition-all ${darkMode ? 'bg-slate-800/80 border-slate-700' : 'bg-white/80 border-white'}`}>
                        {[
                            { id: 'pantry', label: t.pantry, icon: '🏠' },
                            { id: 'add', label: t.add, icon: '➕' },
                            { id: 'stats', label: t.stats, icon: '📊' },
                            { id: 'cart', label: t.cart, icon: '🛒' },
                            { id: 'profile', label: t.profile, icon: '👤' }
                        ].map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex flex-col items-center px-4 py-2 rounded-2xl transition-all duration-300 ${activeTab === tab.id ? 'bg-emerald-600 text-white shadow-lg scale-105' : 'text-slate-400 hover:text-emerald-500'}`}
                            >
                                <span className="text-lg">{tab.icon}</span>
                                <span className="text-[10px] font-bold uppercase mt-1">{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
                </div>
            );

            async function updateQty(id, newVal) {
                if (newVal < 0) return;
                setProducts(prev => prev.map(p => p.id === id ? { ...p, stock: newVal } : p));
            }

            async function updateProduct(updated) {
                setProducts(prev => prev.map(p => p.id === updated.id ? updated : p));
            }

            async function addProduct(name, stock, min, category, expiry, photo) {
                const newProduct = {
                    id: Date.now().toString(),
                    name,
                    stock: parseInt(stock) || 1,
                    min: parseInt(min) || 1,
                    category: category || 'General',
                    expiry: expiry || '',
                    photo: photo || '',
                    createdAt: new Date().toISOString()
                };
                setProducts(prev => [...prev, newProduct]);
                setActiveTab('pantry');
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body> 
</html>
