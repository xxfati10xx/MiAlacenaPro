                return locMap[loc] || loc;

                        if (m.type === 'consume') totalConsumed += m.qty;

                        if ((m.type === 'consume' || m.type === 'waste') && p.createdAt) {
                            const life = (new Date(m.date) - new Date(p.createdAt)) / (1000*60*60*24);
                            if (life > 0) {
                                pantryLife += life;
                                completions++;
                            }
                        }
                    });

                    if (completions > 0) {
                        if (!avgLifeStats[cat]) avgLifeStats[cat] = { total: 0, count: 0 };
                        avgLifeStats[cat].total += (pantryLife / completions);
                        avgLifeStats[cat].count += 1;
                    }
                });

                const wasteIndex = totalConsumed + totalWasted > 0
                    ? (totalWasted / (totalConsumed + totalWasted)) * 100
                    : 0;

                const categoryAvgLife = Object.entries(avgLifeStats).map(([cat, data]) => ({
                    cat,
                    avg: (data.total / data.count).toFixed(1)
                }));

                const cookableRecipes = (recipes || []).filter(r =>
                    r && r.ingredients && r.ingredients.every(ing => {
                        const p = products.find(p => p.name && p.name.toLowerCase() === (ing.name || "").toLowerCase());
                        return p && p.stock >= (ing.qty || 0);
                    })
                ).length;
                const recipeCoverage = (recipes && recipes.length > 0) ? (cookableRecipes / recipes.length) * 100 : 0;

                const topUsed = [...products].sort((a, b) => {
                    const aC = (a.movementHistory || []).filter(m => m.type === 'consume').reduce((acc, m) => acc + m.qty, 0);
                    const bC = (b.movementHistory || []).filter(m => m.type === 'consume').reduce((acc, m) => acc + m.qty, 0);
                    return bC - aC;
                }).slice(0, 5).filter(p => (p.movementHistory || []).some(m => m.type === 'consume'));

                const frequencyData = products.map(p => {
                    const consumes = (p.movementHistory || []).filter(m => m.type === 'consume').sort((a, b) => new Date(a.date) - new Date(b.date));
                    if (consumes.length < 2) return null;
                    const diffs = [];
                    for(let i=1; i<consumes.length; i++) {
                        diffs.push((new Date(consumes[i].date) - new Date(consumes[i-1].date)) / (1000*60*60*24));
                    }
                    const avg = diffs.reduce((a,b) => a+b, 0) / diffs.length;
                    return { name: p.name, avg: avg.toFixed(1) };
                }).filter(Boolean);

                const suggestions = products.filter(p => {
                    const consumes = (p.movementHistory || []).filter(m => m.type === 'consume');
                    if (consumes.length < 2) return p.stock <= p.min;
                    const last = new Date(consumes[consumes.length-1].date);
                    const diffDays = (now - last) / (1000*60*60*24);
                    const frequencyDataForP = frequencyData.find(f => f.name === p.name);
                    return p.stock <= p.min || (frequencyDataForP && diffDays >= parseFloat(frequencyDataForP.avg));
                }).slice(0, 3);

                return { totalValue, underMin, outOfStock, categoryStats, locationStats, wasteIndex, recipeCoverage, topUsed, frequencyData, suggestions, categoryAvgLife };
            })();

                                        <input
                                            value={editingProduct.name}
                                            onChange={(e) => setEditingProduct({...editingProduct, name: e.target.value})}
                                            className={`w-full p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-400 ${darkMode ? 'bg-slate-700' : 'bg-slate-50'}`}
                                        />
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="text-xs font-bold uppercase text-slate-400 ml-2">{t.stockActual}</label>
                                            <input
                                                type="number"
                                                value={editingProduct.stock}
                                                onChange={(e) => setEditingProduct({...editingProduct, stock: parseInt(e.target.value) || 0})}
                                                className={`w-full p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-400 ${darkMode ? 'bg-slate-700' : 'bg-slate-50'}`}
                                            />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-xs font-bold uppercase text-slate-400 ml-2">{t.minimum}</label>
                                            <input
                                                type="number"
                                                value={editingProduct.min}
                                                onChange={(e) => setEditingProduct({...editingProduct, min: parseInt(e.target.value) || 0})}
                                                className={`w-full p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-400 ${darkMode ? 'bg-slate-700' : 'bg-slate-50'}`}
                                            />
                                        </div>
                                    </div>
                                    <div className="flex gap-4">
                                        <div className="flex-1">
                                            <label className="text-xs font-bold uppercase text-slate-400 ml-2">{t.price}</label>
                                            <input
                                                type="number"
                                                step="0.01"
                                                value={editingProduct.price || ''}
                                                onChange={(e) => setEditingProduct({...editingProduct, price: parseFloat(e.target.value) || 0})}
                                                className={`w-full p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-400 ${darkMode ? 'bg-slate-700' : 'bg-slate-50'}`}
                                            />
                                        </div>
                                        <div className="flex-1">
                                            <label className="text-xs font-bold uppercase text-slate-400 ml-2">{t.location}</label>
                                            <select
                                                value={editingProduct.location || 'Pantry'}
                                                onChange={(e) => setEditingProduct({...editingProduct, location: e.target.value})}
                                                className={`w-full p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-400 ${darkMode ? 'bg-slate-700' : 'bg-slate-50'}`}
                                            >
                                                {['Pantry', 'Fridge', 'Freezer', 'Other'].map(l => <option key={l} value={l}>{getLocationLabel(l)}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                {editingProduct.priceHistory && editingProduct.priceHistory.length > 1 && (
                                    <div className="mt-2">
                                        <p className="text-[10px] font-bold uppercase text-slate-400 ml-2 mb-1">{t.priceHistory}</p>
                                        <div className="flex gap-2 overflow-x-auto pb-2 scrollbar-hide">
                                            {editingProduct.priceHistory.slice(-5).reverse().map((ph, idx) => (
                                                <div key={idx} className="bg-slate-50 dark:bg-slate-700/50 p-2 rounded-xl text-center min-w-[70px] border border-slate-100 dark:border-slate-600">
                                                    <div className="text-[9px] text-slate-400">{new Date(ph.date).toLocaleDateString(lang, {month:'short', day:'numeric'})}</div>
                                                    <div className="text-xs font-bold text-emerald-600">${ph.price}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                                    <button
                                        onClick={() => {
                                            updateProduct(editingProduct);
                                            setEditingProduct(null);
                                        }}
                                        className="w-full p-4 bg-emerald-600 text-white rounded-2xl font-bold shadow-lg shadow-emerald-200 mt-4"
                                    >
                                        {t.saveBtn}
                                    </button>
                                    <button
                                        onClick={() => {
                                            markAsWaste(editingProduct.id);
                                            setEditingProduct(null);
                                        }}
                                        className="w-full p-4 bg-orange-100 text-orange-600 rounded-2xl font-bold transition-all active:scale-95 mt-2"
                                    >
                                        🗑️ {t.wasteBtn}
                                    </button>
                                    <button
                                        onClick={() => {
                                            if(confirm(t.confirmDelete)) {
                                                setProducts(products.filter(p => p.id !== editingProduct.id));
                                                setEditingProduct(null);
                                            }
                                        }}
                                        className="w-full p-4 bg-red-50 text-red-500 rounded-2xl font-bold transition-all active:scale-95"
                                    >
                                        {t.deleteBtn}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    <nav className={`fixed bottom-6 left-1/2 -translate-x-1/2 w-[95%] md:max-w-2xl backdrop-blur-xl border rounded-[2.5rem] p-2 flex justify-around shadow-2xl z-50 transition-all ${darkMode ? 'bg-slate-800/80 border-slate-700' : 'bg-white/80 border-white'}`}>
                        {[
                            { id: 'pantry', label: t.pantry, icon: '🏠' },
                            { id: 'add', label: t.add, icon: '➕' },
                            { id: 'stats', label: t.stats, icon: '📊' },
                            { id: 'cart', label: t.cart, icon: '🛒' },
                            { id: 'profile', label: t.profile, icon: '👤' }
                        ].map(tab => (
                            <button
                                key={tab.id}
                                onClick={() => setActiveTab(tab.id)}
                                className={`flex flex-col items-center px-4 py-2 rounded-2xl transition-all duration-300 ${activeTab === tab.id ? 'bg-emerald-600 text-white shadow-lg scale-105' : 'text-slate-400 hover:text-emerald-500'}`}
                            >
                                <span className="text-lg">{tab.icon}</span>
                                <span className="text-[10px] font-bold uppercase mt-1">{tab.label}</span>
                            </button>
                        ))}
                    </nav>
                </div>
                </div>
            );

            async function updateQty(id, newVal) {
                if (newVal < 0) return;
                setProducts(prev => prev.map(p => {
                    if (p.id === id) {
                        const diff = newVal - p.stock;
                        const movement = {
                            qty: Math.abs(diff),
                            type: diff > 0 ? 'add' : 'consume',
                            date: new Date().toISOString()
                        };
                        return {
                            ...p,
                            stock: newVal,
                            movementHistory: [...(p.movementHistory || []), movement]
                        };
                    }
                    return p;
                }));
            }

            async function markAsWaste(id) {
                setProducts(prev => prev.map(p => {
                    if (p.id === id) {
                        const movement = {
                            qty: p.stock,
                            type: 'waste',
                            date: new Date().toISOString()
                        };
                        return {
                            ...p,
                            stock: 0,
                            movementHistory: [...(p.movementHistory || []), movement]
                        };
                    }
                    return p;
                }));
            }

            async function updateProduct(updated) {
                setProducts(prev => prev.map(p => {
                    if (p.id === updated.id) {
                        let newPriceHistory = p.priceHistory || [];
                        if (updated.price !== p.price) {
                            newPriceHistory = [...newPriceHistory, { price: updated.price, date: new Date().toISOString() }];
                        }

                        let newMovementHistory = p.movementHistory || [];
                        if (updated.stock !== p.stock) {
                            const diff = updated.stock - p.stock;
                            newMovementHistory = [...newMovementHistory, {
                                qty: Math.abs(diff),
                                type: diff > 0 ? 'add' : 'consume',
                                date: new Date().toISOString()
                            }];
                        }

                        return { ...updated, priceHistory: newPriceHistory, movementHistory: newMovementHistory };
                    }
                    return p;
                }));
            }

            async function addProduct(name, stock, min, category, expiry, photo, price, location) {
                const newProduct = {
                    id: Date.now().toString(),
                    name,
                    stock: parseInt(stock) || 1,
                    min: parseInt(min) || 1,
                    category: category || 'General',
                    expiry: expiry || '',
                    photo: photo || '',
                    price: parseFloat(price) || 0,
                    location: location || 'Pantry',
                    priceHistory: price ? [{ price: parseFloat(price), date: new Date().toISOString() }] : [],
                    movementHistory: [{ type: 'initial', qty: parseInt(stock) || 1, date: new Date().toISOString() }],
                    createdAt: new Date().toISOString()
                };
                setProducts(prev => [...prev, newProduct]);
                setActiveTab('pantry');
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body> 
</html>
