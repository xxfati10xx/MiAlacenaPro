            const [profileName, setProfileName] = useState(() => localStorage.getItem('pantry_profileName') || 'Carlos');
            const [profileAvatar, setProfileAvatar] = useState(() => localStorage.getItem('pantry_profileAvatar') || `https://api.dicebear.com/7.x/avataaars/svg?seed=${localStorage.getItem('pantry_profileName') || 'Carlos'}`);
            const [currencySymbol, setCurrencySymbol] = useState(() => localStorage.getItem('pantry_currency') || '$');
            const [reminderDays, setReminderDays] = useState(() => parseInt(localStorage.getItem('pantry_reminderDays')) || 3);

            useEffect(() => { localStorage.setItem('pantry_profileName', profileName); }, [profileName]);
            useEffect(() => { localStorage.setItem('pantry_profileAvatar', profileAvatar); }, [profileAvatar]);
            useEffect(() => { localStorage.setItem('pantry_currency', currencySymbol); }, [currencySymbol]);
            useEffect(() => { localStorage.setItem('pantry_reminderDays', reminderDays); }, [reminderDays]);

            const loginWithGoogle = () => {
                if (typeof firebase === 'undefined' || !firebase.auth) {
                    return alert("Firebase no cargado correctamente.");
                }
                const provider = new firebase.auth.GoogleAuthProvider();
                firebase.auth().signInWithPopup(provider).then((result) => {
                    if (result.user) {
                        setProfileName(result.user.displayName || 'Usuario');
                        setProfileAvatar(result.user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${result.user.displayName}`);
                    }
                }).catch((error) => {
                    console.error("Auth Error:", error);
                    alert("Error al iniciar sesión: " + error.message);
                });
            };

            const requestNotificationPermission = () => {
                if (!("Notification" in window)) return alert("Este navegador no soporta notificaciones.");
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") {
                        new Notification("¡Listo!", { body: `Te avisaremos ${reminderDays} días antes de que venzan tus productos.` });
                    }
                });
            };

            const getIcon = (name, cat) => {
                const map = {
                    'Lácteos': '🥛', 'Carnes': '🍖', 'Frutas/Verduras': '🍎', 'Despensa': '🥫',
                    'Bebidas': '🥤', 'Limpieza': '🧹', 'Higiene': '🧼', 'General': '📦',
                    'Dairy': '🥛', 'Meats': '🍖', 'Produce': '🍎', 'Pantry': '🥫',
                    'Drinks': '🥤', 'Cleaning': '🧹', 'Hygiene': '🧼',
                    'leche': '🥛', 'milk': '🥛', 'pan': '🍞', 'bread': '🍞', 'huevo': '🥚', 'egg': '🥚',
                    'carne': '🥩', 'meat': '🥩', 'pollo': '🍗', 'chicken': '🍗',
                    'arroz': '🍚', 'rice': '🍚', 'pasta': '🍝', 'agua': '💧', 'water': '💧',
                    'cerveza': '🍺', 'beer': '🍺', 'vino': '🍷', 'wine': '🍷',
                    'manzana': '🍎', 'apple': '🍎', 'platano': '🍌', 'banana': '🍌',
                    'tomate': '🍅', 'tomato': '🍅', 'cebolla': '🧅', 'onion': '🧅'
                };
                return map[cat] || map[name.toLowerCase()] || '📦';
            };

            const getCategoryLabel = (cat) => {
                const catMap = {
                    'General': t.catGeneral, 'Lácteos': t.catDairy, 'Carnes': t.catMeat,
                    'Frutas/Verduras': t.catProduce, 'Despensa': t.catPantry,
                    'Bebidas': t.catDrinks, 'Limpieza': t.catCleaning, 'Higiene': t.catHygiene
                };
                return catMap[cat] || cat;
            };

            const getLocationLabel = (loc) => {
                const locMap = {
                    'Fridge': t.locFridge, 'Freezer': t.locFreezer, 'Pantry': t.locPantry, 'Other': t.locOther
                };
                return locMap[loc] || loc;
            };

            const [products, setProducts] = useState(() => JSON.parse(localStorage.getItem('pantry_products') || '[]'));
            const [recipes, setRecipes] = useState(() => JSON.parse(localStorage.getItem('pantry_recipes') || '[{"id":"1","name":"Pasta Básica","ingredients":[{"name":"pasta","qty":1},{"name":"tomate","qty":2}],"instructions":["Hierve agua con sal","Añade la pasta y cocina 10 minutos","Escurre y mezcla con tomate"]}]'));
            const [loading, setLoading] = useState(false);
            const [activeTab, setActiveTab] = useState('pantry');
            const [lang, setLang] = useState(() => localStorage.getItem('pantry_lang') || 'es');
            const [darkMode, setDarkMode] = useState(() => localStorage.getItem('pantry_darkMode') === 'true');
            const [editingProduct, setEditingProduct] = useState(null);
            const [heatmapMode, setHeatmapMode] = useState(false);
            const [showQRModal, setShowQRModal] = useState(false);
            const [qrData, setQrData] = useState('');
            const [isScanning, setIsScanning] = useState(false);
            const [isAIScanning, setIsAIScanning] = useState(false);
            const [isTicketScanning, setIsTicketScanning] = useState(false);
            const [isListening, setIsListening] = useState(false);
            const [lastCommand, setLastCommand] = useState('');
            const [searchQuery, setSearchQuery] = useState('');

            useEffect(() => {
                localStorage.setItem('pantry_products', JSON.stringify(products));
            }, [products]);

            useEffect(() => {
                localStorage.setItem('pantry_recipes', JSON.stringify(recipes));
            }, [recipes]);

            useEffect(() => {
                localStorage.setItem('pantry_lang', lang);
            }, [lang]);

            useEffect(() => {
                localStorage.setItem('pantry_darkMode', darkMode);
            }, [darkMode]);

            const user = { displayName: 'Mi Inventario Local', email: 'Modo Offline Activado' };

            const t = TRANSLATIONS[lang] || TRANSLATIONS.es;

            const [budget, setBudget] = useState(() => parseFloat(localStorage.getItem('pantry_budget')) || 100);

            useEffect(() => {
                localStorage.setItem('pantry_budget', budget);
            }, [budget]);

            const stats = (() => {
                const now = new Date();
                const predictions = {};

                // TF.js Regression for Depletion Prediction
                products.forEach(p => {
                    const consumes = (p.movementHistory || []).filter(m => m.type === 'consume');
                    if (consumes.length >= 3) {
                        // Simple Linear Regression: x = days since created, y = total consumed
                        const data = consumes.map(m => ({
                            x: (new Date(m.date) - new Date(p.createdAt)) / (1000*60*60*24),
                            y: m.qty
                        }));

                        const avgX = data.reduce((a, b) => a + b.x, 0) / data.length;
                        const avgY = data.reduce((a, b) => a + b.y, 0) / data.length;

                        let num = 0, den = 0;
                        data.forEach(d => {
                            num += (d.x - avgX) * (d.y - avgY);
                            den += (d.x - avgX) ** 2;
                        });

                        const slope = den === 0 ? 0 : num / den; // Consumption per day
                        if (slope > 0) {
                            const daysLeft = p.stock / slope;
                            predictions[p.id] = {
                                days: Math.max(0, daysLeft).toFixed(1),
                                date: new Date(now.getTime() + daysLeft * 24 * 60 * 60 * 1000).toLocaleDateString(lang, {month:'short', day:'numeric'})
                            };
                        }
                    }
                });

                const totalValue = products.reduce((acc, p) => acc + (p.stock * (p.price || 0)), 0);

                const underMin = products.filter(p => p.stock <= p.min && p.stock > 0);
                const outOfStock = products.filter(p => p.stock === 0);

                const categoryStats = {};
                const locationStats = {};
                let totalWasted = 0;
                let totalConsumed = 0;

                const avgLifeStats = {};

                products.forEach(p => {
                    const cat = p.category || 'General';
                    categoryStats[cat] = (categoryStats[cat] || 0) + (p.stock * (p.price || 0));

                    const loc = p.location || 'Pantry';
                    locationStats[loc] = (locationStats[loc] || 0) + 1;

                    let pantryLife = 0;
                    let completions = 0;

                    (p.movementHistory || []).forEach(m => {
                        if (m.type === 'waste') totalWasted += m.qty;
                        if (m.type === 'consume') totalConsumed += m.qty;

                        if ((m.type === 'consume' || m.type === 'waste') && p.createdAt) {
                            const life = (new Date(m.date) - new Date(p.createdAt)) / (1000*60*60*24);
                            if (life > 0) {
                                pantryLife += life;
                                completions++;
                            }
                        }
                    });

                    if (completions > 0) {
                        if (!avgLifeStats[cat]) avgLifeStats[cat] = { total: 0, count: 0 };
                        avgLifeStats[cat].total += (pantryLife / completions);
                        avgLifeStats[cat].count += 1;
                    }
                });

                const wasteIndex = totalConsumed + totalWasted > 0
                    ? (totalWasted / (totalConsumed + totalWasted)) * 100
                    : 0;

                const categoryAvgLife = Object.entries(avgLifeStats).map(([cat, data]) => ({
                    cat,
                    avg: (data.total / data.count).toFixed(1)
                }));

                const cookableRecipes = (recipes || []).filter(r =>
                    r && r.ingredients && r.ingredients.every(ing => {
                        const p = products.find(p => p.name && p.name.toLowerCase() === (ing.name || "").toLowerCase());
                        return p && p.stock >= (ing.qty || 0);
                    })
                ).length;
                const recipeCoverage = (recipes && recipes.length > 0) ? (cookableRecipes / recipes.length) * 100 : 0;

                const topUsed = [...products].sort((a, b) => {
                    const aC = (a.movementHistory || []).filter(m => m.type === 'consume').reduce((acc, m) => acc + m.qty, 0);
                    const bC = (b.movementHistory || []).filter(m => m.type === 'consume').reduce((acc, m) => acc + m.qty, 0);
                    return bC - aC;
                }).slice(0, 5).filter(p => (p.movementHistory || []).some(m => m.type === 'consume'));

                const frequencyData = products.map(p => {
                    const consumes = (p.movementHistory || []).filter(m => m.type === 'consume').sort((a, b) => new Date(a.date) - new Date(b.date));
                    if (consumes.length < 2) return null;
                    const diffs = [];
                    for(let i=1; i<consumes.length; i++) {
                        diffs.push((new Date(consumes[i].date) - new Date(consumes[i-1].date)) / (1000*60*60*24));
                    }
                    const avg = diffs.reduce((a,b) => a+b, 0) / diffs.length;
                    return { name: p.name, avg: avg.toFixed(1) };
                }).filter(Boolean);

                const suggestions = products.filter(p => {
                    const consumes = (p.movementHistory || []).filter(m => m.type === 'consume');
                    if (consumes.length < 2) return p.stock <= p.min;
                    const last = new Date(consumes[consumes.length-1].date);
                    const diffDays = (now - last) / (1000*60*60*24);
                    const frequencyDataForP = frequencyData.find(f => f.name === p.name);
                    return p.stock <= p.min || (frequencyDataForP && diffDays >= parseFloat(frequencyDataForP.avg));
                }).slice(0, 3);

                let totalInflation = 0;
                let inflationCount = 0;
                products.forEach(p => {
                    if (p.priceHistory && p.priceHistory.length > 1) {
                        const start = p.priceHistory[0].price;
                        const end = p.priceHistory[p.priceHistory.length - 1].price;
                        if (start > 0) {
                            totalInflation += ((end - start) / start) * 100;
                            inflationCount++;
                        }
                    }
                });
                const personalInflation = inflationCount > 0 ? (totalInflation / inflationCount).toFixed(1) : 0;

                const clusters = {};
                products.forEach(p => {
                    const cat = p.category || 'General';
                    if (!clusters[cat]) clusters[cat] = [];
                    clusters[cat].push(p.name);
                });

                // Pantry Health Analysis
                let totalP = 0, totalC = 0, totalF = 0, totalFB = 0;
                products.forEach(p => {
                    const nutrients = NUTRIENT_MAP[p.category] || { p: 10, c: 70, f: 15, fb: 5 }; // Default more carb-heavy
                    totalP += (nutrients.p * p.stock);
                    totalC += (nutrients.c * p.stock);
                    totalF += (nutrients.f * p.stock);
                    totalFB += (nutrients.fb * p.stock);
                });
                const totalN = totalP + totalC + totalF;
                const macros = totalN > 0 ? {
                    p: (totalP / totalN * 100).toFixed(0),
                    c: (totalC / totalN * 100).toFixed(0),
                    f: (totalF / totalN * 100).toFixed(0),
                    fb: totalFB.toFixed(0)
                } : { p: 0, c: 0, f: 0, fb: 0 };

                const healthAlerts = [];
                if (totalN > 0) {
                    if (parseInt(macros.c) > 70) healthAlerts.push(t.processingAlert);
                    if (parseInt(macros.p) < 15 || parseInt(macros.fb) < 20) healthAlerts.push(t.fiberAlert);
                }

                // Money Leak Detection
                const leaks = products.map(p => {
                    const wasted = (p.movementHistory || []).filter(m => m.type === 'waste').reduce((acc, m) => acc + m.qty, 0);
                    const cost = wasted * (p.price || 0);
                    const moves = (p.movementHistory || []).filter(m => m.type === 'add').length;
                    return { id: p.id, name: p.name, cost, moves, wasted };
                }).filter(l => l.cost > 0 || l.moves > 5).sort((a, b) => b.cost - a.cost);

                return { totalValue, underMin, outOfStock, categoryStats, locationStats, wasteIndex, recipeCoverage, topUsed, frequencyData, suggestions, categoryAvgLife, personalInflation, predictions, clusters, macros, healthAlerts, leaks };
            })();

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-slate-50">
                    <div className="w-16 h-16 border-4 border-emerald-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                    <div className="text-emerald-600 font-bold animate-pulse text-xl tracking-tight">{t.title} Pro</div>
                </div>
            );

            return (
                <div className={`min-h-screen transition-colors duration-500 ${darkMode ? 'bg-slate-900 text-white' : 'bg-slate-50 text-slate-800'}`}>
                <div className="max-w-5xl mx-auto min-h-screen pb-32 px-4">
                    <header className="pt-8 pb-6 flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-full bg-[#fce0d3] border-2 border-white shadow-sm overflow-hidden flex items-center justify-center">
                                <img src={profileAvatar} alt="Avatar" className="w-10 h-10 mt-2" />
                            </div>
                            <div>
                                <p className="text-[#94a3b8] text-xs font-medium">{t.greeting}</p>
                                <h1 className={`text-xl font-bold tracking-tight ${darkMode ? 'text-white' : 'text-[#0f172a]'}`}>{t.hello}, {profileName}</h1>
                            </div>
                        </div>
                        <div className="flex gap-2 items-center">
                             <button
                                onClick={() => startVoiceAssistant()}
                                title={t.voiceAssistant}
                                className={`w-12 h-12 rounded-full flex items-center justify-center shadow-sm border border-slate-100 ${isListening ? 'bg-red-500 text-white animate-pulse' : (darkMode ? 'bg-slate-800 border-slate-700' : 'bg-[#f8fafc]')}`}
                             >
                                <span className="material-symbols-rounded">mic</span>
                             </button>
                             <button className={`w-12 h-12 rounded-full flex items-center justify-center shadow-sm border border-slate-100 ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-[#f8fafc]'}`}>
                                <span className="material-symbols-rounded text-[#334155]">notifications</span>
                             </button>
                        </div>
                    </header>

                    {activeTab === 'pantry' ? (
                        <React.Fragment>
                            <div className="flex flex-col gap-6">
                            <div className={`relative flex items-center p-4 rounded-2xl shadow-sm border border-slate-100 ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-[#f1f5f9]'}`}>
                                <span className="material-symbols-rounded text-[#94a3b8] absolute left-4">search</span>
                                <input
                                    type="text"
                                    placeholder={t.search}
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    className="bg-transparent w-full pl-10 outline-none text-sm font-medium placeholder:text-[#94a3b8]"
                                />
                            </div>

                            <div className="grid grid-cols-3 gap-3">
                                <div className={`p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-1 ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white'}`}>
                                    <p className="text-[10px] text-[#94a3b8] font-bold uppercase tracking-wider">{t.totalValue}</p>
                                    <h2 className="text-2xl font-extrabold text-[#0f172a]">{products.length}</h2>
                                    <div className="flex items-center gap-1 text-[#19e66f] text-[10px] font-bold">
                                        <span className="material-symbols-rounded !text-[14px]">trending_up</span>
                                        2%
                                    </div>
                                </div>
                                <div className={`p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-1 ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-[#fff7ed]'}`}>
                                    <p className="text-[10px] text-[#f97316] font-bold uppercase tracking-wider">{t.underMin}</p>
                                    <h2 className="text-2xl font-extrabold text-[#f97316]">{stats.underMin.length.toString().padStart(2, '0')}</h2>
                                    <div className="flex items-center gap-1 text-[#f97316] text-[10px] font-bold">
                                        <span className="material-symbols-rounded !text-[14px]">warning</span>
                                        {t.alert}
                                    </div>
                                </div>
                                <div className={`p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-1 ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-[#fff1f2]'}`}>
                                    <p className="text-[10px] text-[#e11d48] font-bold uppercase tracking-wider">{t.expiry}</p>
                                    <h2 className="text-2xl font-extrabold text-[#e11d48]">
                                        {products.filter(p => p.expiry && (new Date(p.expiry) - new Date()) / (1000*60*60*24) < reminderDays).length.toString().padStart(2, '0')}
                                    </h2>
                                    <div className="flex items-center gap-1 text-[#e11d48] text-[10px] font-bold">
                                        <span className="material-symbols-rounded !text-[14px]">event_busy</span>
                                        {t.soon}
                                    </div>
                                </div>
                            </div>

                            <div className="flex justify-between items-center px-1">
                                <h2 className={`text-xl font-bold ${darkMode ? 'text-white' : 'text-[#0f172a]'}`}>Mi Alacena</h2>
                                <button className="text-primary text-sm font-bold">{t.seeAll}</button>
                            </div>

                            <div className="grid grid-cols-1 gap-4 pb-20">
                                {products.length === 0 ? (
                                <p className="col-span-full text-center text-slate-400 mt-10 animate-pulse">{t.empty}</p>
                                ) : products.filter(p => p.name.toLowerCase().includes(searchQuery.toLowerCase())).map(p => {
                                    let heatmapStyle = {};
                                    if (heatmapMode) {
                                        const ageDays = (new Date() - new Date(p.createdAt || Date.now())) / (1000*60*60*24);
                                        // Scale: 0 days = blue, 14+ days = red
                                        const hue = Math.max(0, Math.min(240, 240 - (ageDays * (240/14)))); // 240 (blue) to 0 (red)
                                        heatmapStyle = { backgroundColor: `hsla(${hue}, 70%, 50%, 0.15)`, borderColor: `hsla(${hue}, 70%, 50%, 0.4)` };
                                    }
                                    return (
                                        <div key={p.id} style={heatmapStyle} className={`${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white'} p-4 rounded-3xl border border-slate-100 shadow-sm flex items-center gap-4 animate-pop`}>
                                            <div className="w-20 h-20 rounded-2xl bg-slate-50 overflow-hidden flex items-center justify-center shrink-0">
                                                {p.photo ? (
                                                    <img src={p.photo} className="w-full h-full object-cover" />
                                                ) : (
                                                    <div className="text-4xl">{getIcon(p.name, p.category)}</div>
                                                )}
                                            </div>
                                            <div className="flex-1 flex flex-col gap-1 min-w-0">
                                                <div className="flex justify-between items-start">
                                                    <h3 className={`font-bold truncate text-lg ${darkMode ? 'text-white' : 'text-[#0f172a]'}`}>{p.name}</h3>
                                                    {p.stock <= p.min && (
                                                        <span className={`px-3 py-1 rounded-full text-[10px] font-bold shrink-0 ${p.stock === 0 ? 'bg-[#fff1f2] text-[#e11d48]' : 'bg-[#fff7ed] text-[#f97316]'}`}>
                                                            {p.stock === 0 ? 'Crítico' : 'Bajo'}
                                                        </span>
                                                    )}
                                                </div>
                                                <p className="text-[#94a3b8] text-xs font-medium">
                                                    {p.stock} de {Math.max(p.stock, p.min * 2)} {p.unit || t.uUnit}
                                                </p>
                                                <div className="flex items-center gap-3 mt-1">
                                                    <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden">
                                                        <div
                                                            className={`h-full rounded-full transition-all duration-500 ${
                                                                p.stock === 0 ? 'bg-red-500' :
                                                                p.stock <= p.min ? 'bg-orange-500' : 'bg-primary'
                                                            }`}
                                                            style={{ width: `${Math.min(100, (p.stock / (p.min * 2 || 1)) * 100)}%` }}
                                                        ></div>
                                                    </div>
                                                </div>
                                            </div>
                                            <button
                                                onClick={() => setEditingProduct(p)}
                                                className="p-2 text-[#94a3b8] hover:text-slate-600 transition-colors"
                                            >
                                                <span className="material-symbols-rounded">more_vert</span>
                                            </button>
                                        </div>
                                    );
                                })}
                            </div>
                            </div>
                            <button
                                onClick={() => setActiveTab('add')}
                                className="fixed bottom-28 right-6 w-16 h-16 bg-primary text-white rounded-full shadow-2xl flex items-center justify-center z-40 active:scale-90 transition-transform"
                            >
                                <span className="material-symbols-rounded !text-4xl">add</span>
                            </button>
                        </React.Fragment>
                    ) : activeTab === 'add' ? (
                        <div className={`animate-pop p-6 rounded-[2.5rem] shadow-xl border ${darkMode ? 'bg-slate-800 border-slate-700' : 'bg-white'}`}>
                             <h2 className="text-xl font-bold mb-4">{t.addProductTitle}</h2>
                             <div className="grid gap-3">
                                 <div className="flex gap-2">
                                     <input
                                        id="pName"
                                        type="text"
                                        placeholder={t.placeholderName}
                                        onInput={(e) => {
                                            const val = e.target.value.toLowerCase();
                                            const match = products.find(p => p.name.toLowerCase().startsWith(val));
                                            if (val.length > 1 && match) {
                                                document.getElementById('pCat').value = match.category;
                                                document.getElementById('pUnit').value = match.unit || 'unid';
                                                document.getElementById('pLoc').value = match.location || 'Pantry';
                                            }
                                        }}
                                        className={`flex-1 p-4 rounded-2xl outline-none focus:ring-2 ring-emerald-400 ${darkMode ? 'bg-slate-700 border-slate-600' : 'bg-slate-50'}`}
                                     />
                                     <button
                                        onClick={() => runAIScan()}
                                        title={t.aiScan}
                                        className="w-14 h-14 bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 rounded-2xl flex items-center justify-center text-xl shadow-inner active:scale-95 transition-all"
                                     >
                                        {isAIScanning ? '⌛' : '👁️'}
                                     </button>
                                     <button
                                        onClick={() => scanTicket()}
                                        title="OCR Ticket"
                                        className="w-14 h-14 bg-blue-100 dark:bg-blue-900/30 text-blue-600 rounded-2xl flex items-center justify-center text-xl shadow-inner active:scale-95 transition-all"
                                     >
                                        {isTicketScanning ? '⌛' : '🧾'}
                                     </button>

            async function updateQty(id, newVal) {
                if (newVal < 0) return;
                setProducts(prev => prev.map(p => {
                    if (p.id === id) {
                        const diff = newVal - p.stock;
                        const movement = {
                            qty: Math.abs(diff),
                            type: diff > 0 ? 'add' : 'consume',
                            date: new Date().toISOString()
                        };
                        return {
                            ...p,
                            stock: newVal,
                            movementHistory: [...(p.movementHistory || []), movement]
                        };
                    }
                    return p;
                }));
            }

            async function markAsWaste(id) {
                setProducts(prev => prev.map(p => {
                    if (p.id === id) {
                        const movement = {
                            qty: p.stock,
                            type: 'waste',
                            date: new Date().toISOString()
                        };
                        return {
                            ...p,
                            stock: 0,
                            movementHistory: [...(p.movementHistory || []), movement]
                        };
                    }
                    return p;
                }));
            }

            async function updateProduct(updated) {
                setProducts(prev => prev.map(p => {
                    if (p.id === updated.id) {
                        let newPriceHistory = p.priceHistory || [];
                        if (updated.price !== p.price) {
                            newPriceHistory = [...newPriceHistory, { price: updated.price, date: new Date().toISOString() }];
                        }

                        let newMovementHistory = p.movementHistory || [];
                        if (updated.stock !== p.stock) {
                            const diff = updated.stock - p.stock;
                            newMovementHistory = [...newMovementHistory, {
                                qty: Math.abs(diff),
                                type: diff > 0 ? 'add' : 'consume',
                                date: new Date().toISOString()
                            }];
                        }

                        return { ...updated, priceHistory: newPriceHistory, movementHistory: newMovementHistory };
                    }
                    return p;
                }));
            }

            useEffect(() => {
                if (isScanning) {
                    // Esperar a que el DOM se actualice para encontrar el elemento #reader
                    const timer = setTimeout(() => {
                        const html5QrCode = new Html5Qrcode("reader");
                        html5QrCode.start(
                            { facingMode: "environment" },
                            { fps: 10, qrbox: { width: 250, height: 250 } },
                            (decodedText) => {
                            try {
                                const importedData = JSON.parse(decodedText);
                                if (Array.isArray(importedData)) {
                                    // Map back minified keys if necessary
                                    const expanded = importedData.map(p => ({
                                        id: p.i || p.id,
                                        name: p.n || p.name,
                                        stock: p.s !== undefined ? p.s : p.stock,
                                        min: p.m !== undefined ? p.m : p.min,
                                        category: p.c || p.category,
                                        expiry: p.e || p.expiry,
                                        price: p.p || p.price,
                                        location: p.l || p.location,
                                        priceHistory: p.ph || p.priceHistory || [],
                                        movementHistory: p.mh || p.movementHistory || [],
                                        createdAt: p.ca || p.createdAt
                                    }));
                                    setProducts(expanded);
                                    stopScanner();
                                    alert("Inventario sincronizado!");
                                }
                            } catch (e) {
                                console.error("Error parsing QR", e);
                            }
                        },
                        (errorMessage) => {}
                        ).catch(err => console.error("Error starting scanner", err));

                        window.__qrScanner = html5QrCode;
                    }, 500);
                    return () => clearTimeout(timer);
                }
            }, [isScanning]);

            function stopScanner() {
                if (window.__qrScanner) {
                    window.__qrScanner.stop().then(() => {
                        setIsScanning(false);
                    });
                } else {
                    setIsScanning(false);
                }
            }

            function speak(text, onEnd) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = lang;
                if (onEnd) utterance.onend = onEnd;
                window.speechSynthesis.speak(utterance);
            }

            const [auditQueue, setAuditQueue] = useState([]);
            const [cookingStep, setCookingStep] = useState(-1);
            const [activeRecipe, setActiveRecipe] = useState(null);

            function parseNumber(str) {
                const map = { 'uno': 1, 'una': 1, 'dos': 2, 'tres': 3, 'cuatro': 4, 'cinco': 5, 'seis': 6, 'siete': 7, 'ocho': 8, 'nueve': 9, 'diez': 10, 'one': 1, 'two': 2, 'three': 3, 'four': 4, 'five': 5 };
                return map[str] || parseInt(str) || 1;
            }

            function parseMonth(str) {
                const months = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre', 'january', 'february', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december'];
                const idx = months.indexOf(str.toLowerCase());
                if (idx === -1) return null;
                const date = new Date();
                date.setMonth(idx % 12);
                if (date < new Date()) date.setFullYear(date.getFullYear() + 1);
                return date.toISOString().split('T')[0];
            }

            function startVoiceAssistant(customMsg = null) {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (!SpeechRecognition) {
                    alert("Speech Recognition not supported in this browser.");
                    return;
                }

                const recognition = new SpeechRecognition();
                recognition.lang = lang === 'zh' ? 'zh-CN' : lang === 'ja' ? 'ja-JP' : lang === 'en' ? 'en-US' : 'es-ES';
                recognition.interimResults = false;
                recognition.maxAlternatives = 1;

                recognition.onstart = () => {
                    setIsListening(true);
                    setLastCommand('...');
                };

                recognition.onend = () => setIsListening(false);

                recognition.onerror = (event) => {
                    console.error("Speech Error:", event.error);
                    setIsListening(false);
                    setLastCommand('Error: ' + event.error);
                };

                recognition.onresult = (event) => {
                    const transcript = event.results[0][0].transcript.toLowerCase();
                    setLastCommand(transcript);
                    handleVoiceCommand(transcript);
                    setTimeout(() => setLastCommand(''), 5000);
                };

                if (customMsg) {
                    speak(customMsg, () => {
                        try { recognition.start(); } catch(e) {}
                    });
                } else {
                    try { recognition.start(); } catch(e) {}
                }
            }

            function handleVoiceCommand(cmd) {
                console.log("Voice Command:", cmd);
                const words = cmd.split(' ');

                // 1. Auditoría Interactiva (Continuación)
                if (auditQueue.length > 0) {
                    const qty = parseNumber(words.find(w => !isNaN(parseInt(w)) || ['uno','una','dos','tres','one','only'].includes(w)));
                    const p = auditQueue[0];
                    updateQty(p.id, qty);

                    let feedback = lang === 'es' ? `Entendido, stock de ${p.name} actualizado a ${qty}` : `Got it, ${p.name} stock updated to ${qty}`;
                    if (qty <= p.min) {
                        feedback += lang === 'es' ? " y marcado para comprar." : " and marked for purchase.";
                    }

                    const nextQueue = auditQueue.slice(1);
                    setAuditQueue(nextQueue);

                    if (nextQueue.length > 0) {
                        speak(feedback, () => {
                            setTimeout(() => startVoiceAssistant(`${lang === 'es' ? '¿Y cuántos quedan de' : 'And how many left of'} ${nextQueue[0].name}?`), 500);
                        });
                    } else {
                        speak(feedback + (lang === 'es' ? ". Auditoría completada." : ". Audit complete."));
                    }
                    return;
                }

                // 2. Control de Recetas
                if (cmd.includes('cocinar') || cmd.includes('cook') || cmd.includes('receta') || cmd.includes('recipe')) {
                    const r = recipes.find(rec => cmd.includes(rec.name.toLowerCase()));
                    if (r) {
                        setActiveRecipe(r);
                        setCookingStep(0);
                        speak(`${lang === 'es' ? 'Iniciando' : 'Starting'} ${r.name}. ${lang === 'es' ? 'Paso 1:' : 'Step 1:'} ${r.instructions[0]}`);
                        return;
                    }
                }
                if (activeRecipe && (cmd.includes('siguiente') || cmd.includes('next') || cmd.includes('paso') || cmd.includes('step'))) {
                    const nextStep = cookingStep + 1;
                    if (nextStep < (activeRecipe.instructions || []).length) {
                        setCookingStep(nextStep);
                        speak(`${lang === 'es' ? 'Paso' : 'Step'} ${nextStep + 1}: ${activeRecipe.instructions[nextStep]}`);
                    } else {
                        speak(lang === 'es' ? "Receta terminada. ¡Buen provecho!" : "Recipe finished. Enjoy!");
                        setActiveRecipe(null);
                        setCookingStep(-1);
                    }
                    return;
                }

                // 3. Conversor de Unidades
                if (cmd.includes('onzas') || cmd.includes('ounces') || cmd.includes('gramos') || cmd.includes('grams') || cmd.includes('kilos') || cmd.includes('libras') || cmd.includes('pounds')) {
                    const num = parseFloat(cmd.match(/\d+/));
                    if (num) {
                        if (cmd.includes('onza') || cmd.includes('ounce')) {
                            const res = Math.round(num * 28.35);
                            speak(`${num} ${lang === 'es' ? 'onzas son' : 'ounces are'} ${res} ${lang === 'es' ? 'gramos' : 'grams'}`);
                        } else if (cmd.includes('libra') || cmd.includes('pound')) {
                            const res = (num * 0.453).toFixed(2);
                            speak(`${num} ${lang === 'es' ? 'libras son' : 'pounds are'} ${res} ${lang === 'es' ? 'kilos' : 'kilos'}`);
                        } else if (cmd.includes('gramo') || cmd.includes('gram')) {
                            const res = (num / 28.35).toFixed(1);
                            speak(`${num} ${lang === 'es' ? 'gramos son' : 'grams are'} ${res} ${lang === 'es' ? 'onzas' : 'ounces'}`);
                        }
                        return;
                    }
                }

                // 4. Gestión de Productos (Añadir/Quitar/Consultar)
                const qty = parseNumber(words.find(w => !isNaN(parseInt(w)) || ['uno','dos','tres','cuatro','cinco'].includes(w))) || 1;

                // Buscar si se menciona algún producto existente
                const product = products.find(p => cmd.includes(p.name.toLowerCase()));

                if (cmd.includes('añadir') || cmd.includes('comprar') || cmd.includes('agregar') || cmd.includes('add')) {
                    if (product) {
                        updateQty(product.id, product.stock + qty);
                        speak(lang === 'es' ? `Añadido ${qty} a ${product.name}. Nuevo stock: ${product.stock + qty}` : `Added ${qty} to ${product.name}. New stock: ${product.stock + qty}`);
                    } else {
                        // Extraer nombre (lo que no sea comando ni número ni unidad)
                        const unitMap = ['litros','kilos','gramos','unid','unidades','liters','grams','units'];
                        const noise = ['añadir','comprar','agregar','add','vence','caduca','en'];
                        const pName = words.filter(w => !noise.includes(w) && isNaN(parseInt(w)) && !unitMap.includes(w) && !['uno','dos','tres'].includes(w)).join(' ').trim();
                        if (pName) {
                            addProduct(pName, qty, 1, 'General', '', '', 0, 'Pantry', 'unid');
                            speak(lang === 'es' ? `Creado nuevo producto: ${pName} con ${qty} unidades.` : `Created new product: ${pName} with ${qty} units.`);
                        }
                    }
                    return;
                }

                if (cmd.includes('quitar') || cmd.includes('gastar') || cmd.includes('consumir') || cmd.includes('remove') || cmd.includes('spend')) {
                    if (product) {
                        const newStock = Math.max(0, product.stock - qty);
                        updateQty(product.id, newStock);
                        speak(lang === 'es' ? `Quitado ${qty} de ${product.name}. Quedan ${newStock}` : `Removed ${qty} from ${product.name}. ${newStock} left`);
                    } else {
                        speak(lang === 'es' ? "No encontré ese producto para quitar stock." : "I couldn't find that product to remove stock.");
                    }
                    return;
                }

                if (cmd.includes('cuántos') || cmd.includes('consulta') || cmd.includes('información') || cmd.includes('how many') || cmd.includes('info')) {
                    if (product) {
                        speak(lang === 'es' ? `Tienes ${product.stock} ${product.unit} de ${product.name}.` : `You have ${product.stock} ${product.unit} of ${product.name}.`);
                    } else {
                        speak(lang === 'es' ? "No encontré información sobre ese producto." : "I couldn't find info about that product.");
                    }
                    return;
                }

                // 5. Resumen Coach (Resumen Matutino)
                if (cmd.includes('resumen') || cmd.includes('summary') || cmd.includes('hola') || cmd.includes('hello')) {
                    const expiring = products.filter(p => p.expiry && new Date(p.expiry) <= new Date());
                    const low = products.filter(p => p.stock <= p.min);

                    let msg = lang === 'es' ? `Hola ${profileName}. ` : `Hello ${profileName}. `;

                    if (expiring.length > 0) msg += `${lang === 'es' ? 'Atención: vencen hoy' : 'Warning: expiring today'} ${expiring.map(e => e.name).join(', ')}. `;
                    if (low.length > 0) msg += `${lang === 'es' ? 'Te queda poco de' : 'You are low on'} ${low.map(l => l.name).join(', ')}. `;

                    // Add Health Coach snippet
                    if (stats.healthAlerts.length > 0) {
                        msg += `${lang === 'es' ? 'Como tu coach, noto que' : 'As your coach, I notice'} ${stats.healthAlerts[0]}. `;
                    }

                    // Add Money Leak snippet
                    if (stats.leaks.length > 0 && stats.leaks[0].cost > 10) {
                        msg += `${lang === 'es' ? 'Ojo al gasto,' : 'Regarding your budget,'} ${t.leakAlert.replace('este producto', stats.leaks[0].name)}. `;
                    }

                    if (expiring.length === 0 && low.length === 0 && stats.healthAlerts.length === 0) {
                        msg += lang === 'es' ? "Tu alacena se ve perfecta hoy." : "Your pantry looks perfect today.";
                    }

                    speak(msg);
                    return;
                }

                // 6. Auditoría: "Chequeo" o "Check"
                if (cmd.includes('chequeo') || cmd.includes('auditoría') || cmd.includes('audit') || cmd.includes('check')) {
                    const toAudit = products.filter(p => p.stock > 0).slice(0, 5);
                    if (toAudit.length > 0) {
                        setAuditQueue(toAudit);
                        startVoiceAssistant(`${lang === 'es' ? 'Iniciando chequeo. ¿Cuántos quedan de' : 'Starting audit. How many left of'} ${toAudit[0].name}?`);
                    } else {
                        speak(lang === 'es' ? "No hay productos para auditar." : "No products to audit.");
                    }
                    return;
                }

                // Default: Stock query
                const p = products.find(prod => cmd.includes(prod.name.toLowerCase()));
                if (p) {
                    speak(lang === 'es' ? `Quedan ${p.stock} de ${p.name}` : `There are ${p.stock} of ${p.name}`);
                } else {
                    speak(lang === 'es' ? "No entendí el comando. Prueba con añadir, resumen o preguntar por un producto." : "I didn't catch that. Try add, summary, or asking about a product.");
                }
            }

            function generateQR() {
                setShowQRModal(true);
                // Minify data to fit in QR
                const compact = products.map(p => ({
                    i: p.id,
                    n: p.name,
                    s: p.stock,
                    m: p.min,
                    c: p.category,
                    e: p.expiry,
                    p: p.price,
                    l: p.location,
                    ph: (p.priceHistory || []).slice(-3),
                    mh: (p.movementHistory || []).slice(-5),
                    ca: p.createdAt
                }));

                setTimeout(() => {
                    const canvas = document.getElementById('qrCanvas');
                    QRCode.toCanvas(canvas, JSON.stringify(compact), { width: 250 }, (error) => {
                        if (error) console.error(error);
                    });
                }, 100);
            }

            async function scanTicket() {
                setIsTicketScanning(true);
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) { setIsTicketScanning(false); return; }
                    try {
                        const { data: { text } } = await Tesseract.recognize(file, 'spa+eng');
                        const lines = text.split('\n');
                        const detected = [];
                        const blacklist = ['total', 'iva', 'subtotal', 'cambio', 'efectivo', 'tarjeta', 'visa', 'mastercard', 'gracias', 'tienda', 'market', 'super', 'pago', 'cajero', 'fecha', 'hora'];

                        lines.forEach(line => {
                            // Match: [Name] [Price]
                            const match = line.match(/([a-zA-Z\s]{3,})\s+(\d+[\.,]\d+)/);
                            if (match) {
                                const name = match[1].trim();
                                const price = parseFloat(match[2].replace(',', '.'));
                                const isBlacklisted = blacklist.some(word => name.toLowerCase().includes(word));
                                if (name.length > 3 && !isBlacklisted && price > 0) {
                                    detected.push({ name, price });
                                }
                            }
                        });

                        if (detected.length > 0) {
                            const confirmList = detected.map(d => `${d.name}: ${currencySymbol}${d.price}`).join('\n');
                            if (confirm((lang === 'es' ? '¿Añadir estos productos?\n\n' : 'Add these items?\n\n') + confirmList)) {
                                detected.forEach(d => addProduct(d.name, 1, 1, 'General', '', '', d.price, 'Pantry', 'unid'));
                                speak(lang === 'es' ? `Añadidos ${detected.length} productos` : `Added ${detected.length} items`);
                            }
                        } else {
                            alert(lang === 'es' ? "No se detectaron productos claros en el ticket." : "No clear products detected in the ticket.");
                        }
                    } catch (err) {
                        console.error(err);
                        alert("Error OCR: " + err.message);
                    } finally {
                        setIsTicketScanning(false);
                    }
                };
                input.click();
            }

            async function runAIScan() {
                setIsAIScanning(true);
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.capture = 'environment';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (!file) {
                        setIsAIScanning(false);
                        return;
                    }
                    const img = document.createElement('img');
                    img.src = URL.createObjectURL(file);
                    img.onload = async () => {
                        try {
                            const model = await mobilenet.load();
                            const predictions = await model.classify(img);
                            if (predictions && predictions.length > 0) {
                                document.getElementById('pName').value = predictions[0].className.split(',')[0];
                                speak(lang === 'es' ? `Parece que es ${predictions[0].className}` : `Looks like ${predictions[0].className}`);
                            }
                        } catch (err) {
                            console.error("AI Error:", err);
                        } finally {
                            setIsAIScanning(false);
                        }
                    };
                };
                input.click();
            }

            async function addProduct(name, stock, min, category, expiry, photo, price, location, unit) {
                const newProduct = {
                    id: Date.now().toString(),
                    name,
                    stock: parseFloat(stock) || 1,
                    min: parseFloat(min) || 1,
                    category: category || 'General',
                    unit: unit || 'unid',
                    expiry: expiry || '',
                    photo: photo || '',
                    price: parseFloat(price) || 0,
                    location: location || 'Pantry',
                    priceHistory: price ? [{ price: parseFloat(price), date: new Date().toISOString() }] : [],
                    movementHistory: [{ type: 'initial', qty: parseInt(stock) || 1, date: new Date().toISOString() }],
                    createdAt: new Date().toISOString()
                };
                setProducts(prev => [...prev, newProduct]);
                setActiveTab('pantry');
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
